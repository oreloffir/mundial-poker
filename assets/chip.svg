<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mundial Poker — Chip Asset
  Design: gold & navy poker chip with football panel pattern and MP monogram
  Export: chip-64.png (64×64), chip-32.png (32×32), chip-16.png (16×16)
  Colors: #050a18 (navy), #d4a843 (gold), #f0d060 (gold highlight)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="body" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#1e2e54"/>
      <stop offset="100%" stop-color="#050a18"/>
    </radialGradient>

    <radialGradient id="rim" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5e080"/>
      <stop offset="45%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#8a6210"/>
    </radialGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <circle cx="32" cy="33.5" r="29" fill="rgba(0,0,0,0.35)" filter="url(#shadow)"/>

  <!-- Gold outer rim -->
  <circle cx="32" cy="32" r="30" fill="url(#rim)"/>

  <!-- 8 navy edge notches (chip stripe pattern) -->
  <g clip-path="url(#clip)">
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(0 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(45 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(90 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(135 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(180 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(225 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(270 32 32)"/>
    <rect x="29.5" y="2" width="5" height="7" fill="#050a18" rx="0.5" transform="rotate(315 32 32)"/>
  </g>

  <!-- Thin gold highlight inside rim -->
  <circle cx="32" cy="32" r="28.5" fill="none" stroke="rgba(245,224,128,0.35)" stroke-width="0.75"/>

  <!-- Navy chip body -->
  <circle cx="32" cy="32" r="23" fill="url(#body)"/>

  <!-- Inner label ring -->
  <circle cx="32" cy="32" r="19.5" fill="none" stroke="#d4a843" stroke-width="1"/>
  <circle cx="32" cy="32" r="18.5" fill="none" stroke="rgba(212,168,67,0.18)" stroke-width="0.5"/>

  <!-- Football panel pattern: 6 hexagonal dots at r=13 (60° apart) + center pentagon -->
  <!-- 0° = top -->
  <circle cx="32"    cy="19"    r="2.2" fill="rgba(212,168,67,0.22)" stroke="rgba(212,168,67,0.45)" stroke-width="0.4"/>
  <!-- 60° -->
  <circle cx="43.26" cy="25.5"  r="2.2" fill="rgba(212,168,67,0.22)" stroke="rgba(212,168,67,0.45)" stroke-width="0.4"/>
  <!-- 120° -->
  <circle cx="43.26" cy="38.5"  r="2.2" fill="rgba(212,168,67,0.22)" stroke="rgba(212,168,67,0.45)" stroke-width="0.4"/>
  <!-- 180° -->
  <circle cx="32"    cy="45"    r="2.2" fill="rgba(212,168,67,0.22)" stroke="rgba(212,168,67,0.45)" stroke-width="0.4"/>
  <!-- 240° -->
  <circle cx="20.74" cy="38.5"  r="2.2" fill="rgba(212,168,67,0.22)" stroke="rgba(212,168,67,0.45)" stroke-width="0.4"/>
  <!-- 300° -->
  <circle cx="20.74" cy="25.5"  r="2.2" fill="rgba(212,168,67,0.22)" stroke="rgba(212,168,67,0.45)" stroke-width="0.4"/>

  <!-- Center pentagon (soccer ball center patch) -->
  <polygon points="32,26.5 35.5,29 34.2,33 29.8,33 28.5,29"
           fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.38)" stroke-width="0.5"/>

  <!-- MP monogram -->
  <text
    x="32" y="36.5"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="13"
    letter-spacing="1.8"
    fill="#f0d060"
    filter="url(#glow)"
  >MP</text>
</svg>
