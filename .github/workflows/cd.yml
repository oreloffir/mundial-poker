name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PNPM_VERSION: 9

jobs:
  build-production:
    name: Build Production Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-production-${{ github.sha }}
          path: |
            apps/server/dist/
            apps/server/package.json
          retention-days: 30

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-production-${{ github.sha }}
          path: apps/web/dist/
          retention-days: 30

