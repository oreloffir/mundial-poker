name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  PNPM_VERSION: 9

jobs:
  build-production:
    name: Build Production Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-production-${{ github.sha }}
          path: |
            apps/server/dist/
            apps/server/package.json
          retention-days: 30

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-production-${{ github.sha }}
          path: apps/web/dist/
          retention-days: 30

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-production
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/mundial-poker

            echo "--- Pulling latest main ---"
            git pull origin main

            echo "--- Writing .env.production ---"
            cat > .env.production << ENVEOF
            NODE_ENV=production
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            ENVEOF

            echo "--- Building Docker images ---"
            docker-compose -f docker-compose.production.yml build --no-cache

            echo "--- Starting services ---"
            docker-compose -f docker-compose.production.yml up -d

            echo "--- Reloading nginx (flush stale upstream IPs) ---"
            docker-compose -f docker-compose.production.yml restart nginx

            echo "--- Running DB migrations ---"
            cat apps/server/src/db/migrations/*.sql | \
              docker-compose -f docker-compose.production.yml exec -T postgres \
              psql -U wpc -d world_poker_cup

            echo "--- Health check ---"
            sleep 5
            curl -f http://localhost/api/health

            echo "--- Pruning unused Docker images and build cache ---"
            docker system prune -f
            docker builder prune -f

            echo "--- Deploy complete ---"
            docker-compose -f docker-compose.production.yml ps
            echo "Disk usage:" && df -h / | tail -1
