resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name mundialpoker.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mundialpoker.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/mundialpoker.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mundialpoker.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    set $server_backend server:5174;
    set $web_frontend web:80;

    location /api/ {
        proxy_pass http://$server_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /socket.io/ {
        proxy_pass http://$server_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://$web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
